name: Build and Deploy Badges

on:
  push:
    branches: [main]
  schedule:
    # Run nightly at 06:00 UTC to keep publication status fresh
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm test

      - run: npm run generate-samples

      - name: Commit updated badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/badges/
          git diff --cached --quiet || git commit -m "Update badge JSON files"
          git push
